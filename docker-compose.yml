# Low-cost self-hosting: run the panel + broadcaster on one box.
# No inbound ports are required for P2P (outbound UDP hole-punching). Only map RTMP if
# you push from OBS (broadcaster INPUT=rtmp).
services:
  panel:
    build: ./panel
    restart: unless-stopped
    env_file: ./panel/.env
    volumes:
      - panel-data:/data
    # Run `docker compose run --rm panel node src/admin-cli.js init` once to make keys.

  broadcaster:
    build: ./broadcaster
    restart: unless-stopped
    env_file: ./broadcaster/.env
    volumes:
      - broadcaster-data:/data
    # ports:
    #   - "1935:1935"   # uncomment for OBS RTMP push (INPUT=rtmp)

volumes:
  panel-data:
  broadcaster-data:

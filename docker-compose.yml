# Low-cost self-hosting: run the panel + broadcaster on one box.
#
# network_mode: host (Linux-only) is deliberate:
#   - Hyperswarm's UDP hole-punching works without Docker's bridge NAT stacked on
#     the host's NAT (double NAT measurably hurts connectivity).
#   - The admin/control dashboards keep their safe 127.0.0.1 default binding —
#     reachable from the box (or an SSH tunnel / local Caddy), never raw on the WAN.
#   - Push-ingest listeners (RTMP/SRT/TS) added at runtime need no compose edits.
# A bridge-network variant is documented in docs/operator-guide.md if you need it.
#
# A consequence of host networking worth knowing: Docker REFUSES `sysctls:` for net.* here
# (the container shares the host's network namespace, so there is nothing separate to set),
# so the swarm's UDP socket buffers are a HOST setting this file cannot make for you.
# Nothing here needs it to run — but before real viewer load, see the optional
# deploy/sysctl/install.sh and docs/kb/network-tuning.md, or the kernel silently clamps
# those buffers and throughput caps out with no error anywhere.
#
# First-time setup (creates the panel keys, then an admin account):
#   docker compose build
#   docker compose run --rm panel node src/admin-cli.js init
#   docker compose run --rm panel node src/admin-cli.js add-admin <name> <password>
#   docker compose up -d
#
# Container logs are BOUNDED below (json-file, 20 MB x 5 per service). Docker's
# default json-file driver has NO size limit, and a broadcaster that logs a few
# lines per channel-event will eventually fill the disk of any box nobody tends.
# The caps apply when a container is (re)created: `docker compose up -d` after
# pulling this file is enough.
x-logging: &bounded-logs
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  panel:
    build:
      context: .
      dockerfile: panel/Dockerfile
    network_mode: host
    restart: unless-stopped
    logging: *bounded-logs
    env_file: ./panel/.env
    environment:
      # The .env examples say ./data (bare-metal); in a container the data MUST live
      # on the volume. `environment` wins over env_file, so this can't be broken.
      DATA_DIR: /data
    volumes:
      - panel-data:/data

  broadcaster:
    build:
      context: .
      dockerfile: broadcaster/Dockerfile
    network_mode: host
    restart: unless-stopped
    logging: *bounded-logs
    # Give the graceful shutdown (every channel closing its feed store) time to finish before
    # Docker SIGKILLs it. A kill mid-`store.close()` truncates a disk feed's cores, so a short
    # grace can corrupt the stores of a many-channel box on `docker stop`. 60 s is ample; the
    # broadcaster also SELF-HEALS a corrupt store on next start (rotates to a fresh generation),
    # so this is defence-in-depth, not the only guard. See docs/kb/feed-buffer.md.
    stop_grace_period: 60s
    env_file: ./broadcaster/.env
    environment:
      DATA_DIR: /data
      # --- Scale profile (high channel density) — see docs/kb/scaling.md ---
      # Keep the constant per-segment write churn off the disk. Uncomment BOTH lines
      # here and the `tmpfs:` mount below. HLS_WORK_DIR moves ffmpeg's scratch to RAM;
      # FEED_BUFFER=ram moves the Hypercore to RAM too (zero segment IOPS on disk, at
      # the cost of a fresh feedKey per restart — viewers auto-follow via the catalog).
      # HLS_WORK_DIR: /hlstmp
      # FEED_BUFFER: ram
    volumes:
      - broadcaster-data:/data
    # tmpfs for the ffmpeg HLS scratch (scale profile). Size it for your channel count:
    # ~ (HLS_LIST_SIZE + 2) x segment_size x channels — 512m fits dozens of SD copy channels.
    # tmpfs:
    #   - /hlstmp:size=512m

  # VOD library (S8a) — OPTIONAL, behind the `vod` profile so a plain
  # `docker compose up -d` never starts it:
  #   docker compose --profile vod up -d library
  # A separate service on purpose (one-shot transcode bursts + static seeding — none
  # of the live pipeline's lifecycle): many operators run it on a DIFFERENT box than
  # the live fleet; this entry is for the single-box case. Enroll it as its OWN
  # publisher (add-publisher library1 --scopes 'vod-*') — see library/.env.example.
  library:
    build:
      context: .
      dockerfile: library/Dockerfile
    profiles: [vod]
    network_mode: host
    restart: unless-stopped
    logging: *bounded-logs
    env_file: ./library/.env
    environment:
      DATA_DIR: /data
    volumes:
      - library-data:/data

  # Reseller panel — role hierarchy + credit ledger fronting the panel admin API.
  # Behind the `reseller` profile so a plain `up -d` never starts it. Seed the root
  # admin once (first run):
  #   docker compose --profile reseller run --rm reseller node src/reseller-cli.js add-admin <name>
  # Often run on a DIFFERENT box than the panel — then set PANEL_ADMIN_URL to the
  # panel's https address (IP-allowlisted to this box) instead of loopback.
  reseller:
    build:
      context: .
      dockerfile: reseller/Dockerfile
    profiles: [reseller]
    network_mode: host
    restart: unless-stopped
    logging: *bounded-logs
    env_file: ./reseller/.env
    environment:
      DATA_DIR: /data
    volumes:
      - reseller-data:/data

volumes:
  panel-data:
  broadcaster-data:
  library-data:
  reseller-data:

# MkDocs Material configuration for the Aliran documentation site.
# Build:   pip install mkdocs-material mkdocs-mermaid2-plugin && mkdocs serve
# Publish: automatic — .github/workflows/docs.yml deploys to GitHub Pages on push to main
site_name: Aliran
site_url: https://abuelosimpson.github.io/aliran/
site_description: Self-hostable peer-to-peer OTT streaming on the Holepunch/Pear stack
repo_url: https://github.com/AbueloSimpson/aliran
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

nav:
  - Home: README.md
  - Getting started: getting-started.md
  - Concepts: concepts.md
  - Architecture: architecture.md
  - Security model: security-model.md
  - Operator guide: operator-guide.md
  - Repeater appliance: repeater.md
  - Configuration: configuration.md
  - Content management: content-management.md
  - Client build: client-build.md
  - White-label branding: white-label.md
  - User management: user-management.md
  - Reference: reference.md
  - Development log: devlog.md
  - Knowledge base:
      - Overview: kb/index.md
      - Playback & client runtime: kb/playback.md
      - P2P feed buffer & tuning: kb/feed-buffer.md
      - Scaling & capacity planning: kb/scaling.md
      - Network tuning (socket buffers): kb/network-tuning.md
      - Viewer bandwidth & battery: kb/viewer-bandwidth.md
      - Source compatibility (pull ingest): kb/source-compatibility.md
      - Operating panel & broadcaster: kb/operator.md
      - Offline slate media: kb/offline-slate.md
      - Publishing the dashboards: kb/public-dashboards.md
      - Android & RN builds: kb/android-build.md
      - Bare worklet & bundling: kb/bare-worklet.md
  - FAQ & troubleshooting: faq.md
  - Legal & compliance: legal-compliance.md

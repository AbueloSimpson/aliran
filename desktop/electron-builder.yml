# Desktop packaging: Windows (NSIS installer + portable exe) and macOS (dmg + zip).
#   npm run dist          (Windows, from desktop/)
#   npm run dist:mac      (macOS — needs a Mac; CI runs it on a GitHub macOS runner
#                          via .github/workflows/desktop-mac.yml)
# The flavor is decided by what's on disk when packaging: with config/service.json
# present the descriptor is baked into the artifact as a resource (operator build,
# like the phone APK bakes its service.json); absent = keyless public build.
# Builds are UNSIGNED — no code-signing certificate — so Windows SmartScreen shows
# "unknown publisher" on first run (More info → Run anyway), and macOS Gatekeeper
# blocks the first launch (right-click the app → Open). Documented honestly in
# docs/desktop-player.md; per-brand packaging hooks are a follow-up, not v1.
appId: app.aliran.desktop
productName: Aliran
# Keep in step with devDependencies.electron (hoisted to the workspace root, where
# electron-builder cannot resolve a semver range on its own).
electronVersion: 37.10.3
# buildResources deliberately NOT named "build" — the repo's global .gitignore
# ignores build/ dirs, and the icon must be committed.
directories:
  output: dist
  buildResources: assets
files:
  - main/**
  - renderer/index.html
  - renderer/dist/**
  - package.json
extraResources:
  # The operator service descriptor (gitignored — per-deployment, never in the repo).
  # Directory+filter form so a PUBLIC build — packaged with NO config/service.json —
  # simply bakes nothing and the app opens on the Connect screen (runtime key entry);
  # with the file present this is the operator build (key baked, no Connect screen).
  - from: config
    to: config
    filter:
      - service.json
# The engine's native modules (sodium-native, udx-native, …) are N-API prebuilds:
# no rebuild against Electron needed, but .node files cannot load from inside asar.
asarUnpack:
  - "**/*.node"
npmRebuild: false
win:
  target:
    - nsis
    - portable
  icon: assets/icon.png
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
portable:
  artifactName: ${productName}-${version}-portable.exe
mac:
  target:
    - dmg
    - zip
  # electron-builder derives the .icns from the 512×512 PNG.
  icon: assets/icon.png
  category: public.app-category.video
  # UNSIGNED: no Apple Developer certificate. electron-builder still applies the
  # ad-hoc signature arm64 requires, but Gatekeeper flags the first launch
  # (right-click → Open). When a Developer ID cert lands, drop `identity: null`
  # and add hardenedRuntime + entitlements + notarization here.
  identity: null

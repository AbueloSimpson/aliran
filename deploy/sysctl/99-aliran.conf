# Aliran — host network tuning for the P2P swarm transport.
#
# OPTIONAL — nothing in the normal deploy applies this. Recommended before a box takes
# real viewer load. See the "Host network tuning" section of docs/operator-guide.md.
#
# Install:
#   sudo deploy/sysctl/install.sh     # copies this file, applies it, verifies it took
#
# Or by hand:
#   sudo cp deploy/sysctl/99-aliran.conf /etc/sysctl.d/99-aliran.conf
#   sudo sysctl --system          # apply now; it also survives reboots
#   sysctl net.core.rmem_max net.core.wmem_max    # verify
#
# WHY THIS IS A HOST FILE AND NOT A COMPOSE SETTING
#
# The panel and broadcaster run with `network_mode: host`, and Docker refuses `sysctls:`
# for net.* under host networking (the container shares the host's network namespace —
# there is nothing separate to set). These are also not namespaced knobs, so they belong
# to the host regardless of how Aliran is installed. Bare-metal/systemd installs need this
# file too.
#
# WHAT GOES WRONG WITHOUT IT
#
# Hyperswarm's transport is UDX, which multiplexes EVERY peer stream of a swarm over one
# UDP socket pair. Under fan-out (many viewers on one channel) the socket buffer is what
# overflows first — and the kernel drops those datagrams silently. udx's congestion
# control just sees loss and backs off, so the symptom is stalling and collapsing
# throughput with nothing logged. Confirm with `netstat -su`: RcvbufErrors / SndbufErrors.
#
# Aliran asks for its buffers at startup (SWARM_RCVBUF_MB / SWARM_SNDBUF_MB), but
# setsockopt is SILENTLY CLAMPED to the ceilings below and does not fail. Stock Linux ships
# 212992 (208 KiB), so without this file a 2 MiB request quietly becomes 208 KiB. The
# services log a warning naming the exact sysctl when that happens — but the warning is a
# fallback, not the fix.

# Per-socket buffer ceilings (bytes). 8 MiB leaves headroom above the 2 MiB default
# request so operators can raise SWARM_*_MB on a big origin or a repeater without
# editing this file again. These are ceilings, not allocations — nothing is reserved.
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608

# ---------------------------------------------------------------------------------------
# CONNECTION TRACKING (only if you run Docker, ufw, or any other iptables/nftables NAT)
#
# Every peer flow gets a conntrack entry, and UDP entries linger for the timeout below
# after the last packet. Viewer fan-out multiplies flows fast: once the table is full the
# kernel DROPS NEW FLOWS and logs "nf_conntrack: table full, dropping packet" — which
# looks like random connection failures, not a capacity limit.
#
# Left commented because these keys only exist when the conntrack module is loaded, and a
# drop-in referencing an absent key makes `sysctl --system` noisy. Check your headroom:
#   cat /proc/sys/net/netfilter/nf_conntrack_count /proc/sys/net/netfilter/nf_conntrack_max
# Uncomment if you are using more than ~50% of the table under load.
#
# net.netfilter.nf_conntrack_max = 524288
# net.netfilter.nf_conntrack_udp_timeout = 30
# net.netfilter.nf_conntrack_udp_timeout_stream = 120

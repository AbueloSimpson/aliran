buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        // ONE APK from Android 7 up: the patched react-native-bare-kit
        // (patches/react-native-bare-kit+0.13.3.patch) dlopens libbare-kit.so at
        // first use — API 29+ only, its ELF-TLS floor (docs/kb/android-build.md) —
        // instead of link time, so no DT_NEEDED forces Android 10 at install. On
        // Android 7-9 the engine never loads and the SDK is silently inactive
        // (AliranBackend.isSupported() false). 24 is RN 0.83's own hard floor
        // (prefab rejects lower: "library was built for 24") — Android 6 is out of
        // reach for any app on this RN generation. The optional ALIRAN_LEGACY=1
        // flavor still builds an engine-less lean APK at the same floor.
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

# Test suites on every push to main and every PR. Two lanes:
#   core    — fast + deterministic (loopback/local-testnet only, never the public
#             DHT; ffmpeg installed for test:vod). REQUIRED: keep it green.
#   e2e-dht — end-to-end suites over the real Hyperswarm DHT (+ ffmpeg for the media
#             ones). The public DHT can be flaky from hosted runners, so this job is
#             continue-on-error: it reports signal but can never block a merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer commit supersedes any in-flight run for the same ref (tests are safe to cancel).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core (required)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install ffmpeg (needed by test:vod)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: npm ci
      - name: Crypto unit tests (test:core)
        run: npm run test:core
      - name: Client store corruption recovery (test:corrupt)
        run: npm run test:corrupt
      - name: ffmpeg argument builders (test:args)
        run: npm run test:args
      # Loopback UDP + a 1-node local testnet — deterministic, never touches the public
      # DHT. Runners ship the stock net.core.wmem_max, so this also exercises the
      # clamp-detection path against a real undersized kernel ceiling.
      - name: Swarm socket tuning (test:nettune)
        run: npm run test:nettune
      - name: Ephemeral feed buffer / rolling window (test:retention)
        run: npm run test:retention
      # Loopback-only HTTP (in-process panel + local feed server) — deterministic,
      # no DHT, so it belongs in the required lane.
      - name: Remote channel sources (test:sources)
        run: npm run test:sources
      # The whole VOD chain (S8a) on a LOCAL DHT testnet — library ingest → panel vod
      # record class → grant → SDK resolve/serve/seek → delete. Loopback UDP + ffmpeg
      # only, never the public DHT, so it is deterministic enough for the required lane.
      - name: VOD library end-to-end (test:vod)
        timeout-minutes: 10
        run: npm run test:vod
      # Reseller panel: pure logic (roles, credit ledger, store) …
      - name: Reseller panel units (test:reseller-unit)
        run: npm run test:reseller-unit
      # … then the whole hierarchy → credits → activation → lifecycle → outage story
      # against a REAL panel admin server booted in-process. Loopback HTTP only, no
      # DHT at all, so it is fully deterministic — belongs in the required lane.
      - name: Reseller panel end-to-end (test:reseller)
        run: npm run test:reseller

  docker-build:
    name: docker images build (best effort, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # Both images build from the repo ROOT context (they vendor the unpublished
      # @aliran/core workspace package via the file:../core dependency).
      - name: Build panel image
        run: docker build -f panel/Dockerfile -t aliran-panel .
      - name: Build broadcaster image
        if: ${{ !cancelled() }}
        run: docker build -f broadcaster/Dockerfile -t aliran-broadcaster .
      - name: Build library image
        if: ${{ !cancelled() }}
        run: docker build -f library/Dockerfile -t aliran-library .
      - name: Build reseller image
        if: ${{ !cancelled() }}
        run: docker build -f reseller/Dockerfile -t aliran-reseller .
      # Prove the images actually run: `init` exercises the whole panel dependency
      # graph (sodium-native, @aliran/core) in a throwaway container, and the
      # broadcaster image must ship ffmpeg with SRT protocol support (needed for
      # authenticated push ingest).
      - name: Smoke panel image (admin-cli init in a throwaway container)
        if: ${{ !cancelled() }}
        run: docker run --rm aliran-panel node src/admin-cli.js init
      - name: Smoke broadcaster image (ffmpeg + libsrt present)
        if: ${{ !cancelled() }}
        run: docker run --rm --entrypoint ffmpeg aliran-broadcaster -hide_banner -protocols | grep -w srt
      # The library needs ffprobe (ingest probe) and its dependency graph must load.
      - name: Smoke library image (ffprobe present + admin CLI runs)
        if: ${{ !cancelled() }}
        run: |
          docker run --rm --entrypoint ffprobe aliran-library -version | head -1
          docker run --rm aliran-library node src/library-cli.js list-admins
      # The reseller image needs no ffmpeg; list-principals exercises the whole
      # dependency graph (sodium-native, @aliran/core) against an empty store.
      - name: Smoke reseller image (CLI runs)
        if: ${{ !cancelled() }}
        run: docker run --rm aliran-reseller node src/reseller-cli.js list-principals

  e2e-dht:
    name: e2e over the public DHT (best effort, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install ffmpeg (needed by test:sdk / test:broadcaster-api)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: npm ci
      # Each suite retries once (DHT discovery is the flaky part) and is time-capped:
      # a peer that never connects hangs the harness rather than failing it, so the
      # step timeout is the real guard. !cancelled() keeps the remaining suites
      # running after an earlier one fails.
      - name: Sessions + device limits (test:session)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        run: npm run test:session || npm run test:session
      - name: Broadcaster auto-registration (test:register)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        run: npm run test:register || npm run test:register
      - name: Assets pipeline (test:assets)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        run: npm run test:assets || npm run test:assets
      - name: Panel admin API (test:admin-api)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        run: npm run test:admin-api || npm run test:admin-api
      - name: Player SDK + hybrid CDN↔P2P (test:sdk)
        if: ${{ !cancelled() }}
        timeout-minutes: 12
        run: npm run test:sdk || npm run test:sdk
      - name: Broadcaster control API (test:broadcaster-api)
        if: ${{ !cancelled() }}
        timeout-minutes: 12
        run: npm run test:broadcaster-api || npm run test:broadcaster-api
